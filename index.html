<html>
  <head>
    <title>Personajes de HSR</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');

      body {
        background-color: #1b2136;
        margin: 0;
        padding: 20px;
      }

      h2 {
        font-family: 'Oswald', sans-serif;
        font-optical-sizing: auto;
        font-weight: 900;
        font-style: normal;
        font-size: 48px;
        text-align: center;
        color: #ccdbf0;
        animation: fadeSlideDown 0.7s ease both;
      }

      .contenedor {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
      }

      .tarjeta {
        text-align: center;
      }

      .Phainon, .Aglea, .Mydei, .Anaxa {
        width: 300px;
        height: 300px;
        border: 3px solid rgb(54, 54, 119);
        background-color: rgb(54, 54, 119);
        padding: 0;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.3s;
      }

      .Phainon:hover, .Aglea:hover, .Mydei:hover, .Anaxa:hover {
        transform: scale(1.05);
      }

      .Phainon img, .Aglea img, .Mydei img, .Anaxa img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .nombre {
        font-family: 'Ubuntu', sans-serif;
        font-size: 20px;
        font-weight: 700;
        margin-top: 15px;
      }

      .nombre-phainon { color: #5f4cc7; }
      .nombre-aglea   { color: #FFD700; }
      .nombre-mydei   { color: #FF69B4; }
      .nombre-anaxa   { color: #00CED1; }

      .comments-section {
        margin-top: 50px;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
      }
      .comments-section h4 {
        font-family: 'Oswald', sans-serif;
        color: #ccdbf0;
        font-size: 22px;
        margin-bottom: 16px;
        text-align: center;
      }
      .comment-form {
        background-color: #0f1524;
        border: 1px solid rgba(204, 219, 240, 0.2);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 24px;
      }
      .comment-form input[type="text"],
      .comment-form textarea {
        width: 100%;
        background-color: #1b2136;
        border: 1px solid rgba(204, 219, 240, 0.25);
        border-radius: 10px;
        color: #ccdbf0;
        font-family: 'Ubuntu', sans-serif;
        font-size: 14px;
        padding: 10px 14px;
        box-sizing: border-box;
        outline: none;
        margin-bottom: 10px;
        transition: border-color 0.2s;
      }
      .comment-form input[type="text"]:focus,
      .comment-form textarea:focus {
        border-color: rgba(123, 104, 238, 0.7);
      }
      .comment-form textarea {
        resize: vertical;
        min-height: 90px;
      }
      .comment-form button {
        background-color: rgba(123, 104, 238, 0.15);
        border: 1px solid rgba(123, 104, 238, 0.5);
        border-radius: 10px;
        color: #7B68EE;
        font-family: 'Ubuntu', sans-serif;
        font-size: 14px;
        font-weight: 500;
        padding: 8px 22px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      .comment-form button:hover {
        background-color: rgba(123, 104, 238, 0.28);
      }
      .comments-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .comment-item {
        background-color: #0f1524;
        border: 1px solid rgba(204, 219, 240, 0.15);
        border-radius: 14px;
        padding: 14px 18px;
      }

      .comment-text {
        font-family: 'Ubuntu', sans-serif;
        color: #ccdbf0;
        font-size: 14px;
        line-height: 1.6;
      }
      .no-comments {
        font-family: 'Ubuntu', sans-serif;
        color: rgba(204, 219, 240, 0.4);
        font-size: 14px;
        font-style: italic;
        text-align: center;
      }

      @keyframes fadeSlideDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .tarjeta {
        text-align: center;
        opacity: 0;
        animation: fadeSlideUp 0.6s ease forwards;
      }

      .tarjeta:nth-child(1) { animation-delay: 0.2s; }
      .tarjeta:nth-child(2) { animation-delay: 0.4s; }
      .tarjeta:nth-child(3) { animation-delay: 0.6s; }
      .tarjeta:nth-child(4) { animation-delay: 0.8s; }

      .comments-section {
        animation: fadeSlideUp 0.6s ease 1s both;
      }
    </style>
  </head>
  <body>
    <h2>HONKAI STAR RAIL</h2>

    <div class="contenedor">

      <div class="tarjeta">
        <a href="infochar/Phainon.html">
          <div class="Phainon">
            <img src="splash/Character_Phainon_Splash_Art.webp" alt="Phainon">
          </div>
        </a>
        <p class="nombre nombre-phainon">Phainon</p>
      </div>

      <div class="tarjeta">
        <a href="infochar/Aglea.html">
            <div class="Aglea">
            <img src="splash/Character_Aglaea_Splash_Art.webp" alt="Aglea">
            </div>
        </a>
        <p class="nombre nombre-aglea">Aglea</p>
      </div>

      <div class="tarjeta">
        <a href="infochar/Mydei.html">
            <div class="Mydei">
            <img src="splash/Character_Mydei_Splash_Art.webp" alt="Mydei">
            </div>
        </a>
        <p class="nombre nombre-mydei">Mydei</p>
      </div>

      <div class="tarjeta">
        <a href="infochar/Anaxa.html">
            <div class="Anaxa">
            <img src="splash/Character_Anaxa_Splash_Art.webp" alt="Anaxa">
            </div>
        </a>
        <p class="nombre nombre-anaxa">Anaxa</p>
      </div>

    </div>
  
    <div class="comments-section">
        <h4>Comentario</h4>
        <div class="comment-form">
            <input type="text" id="comment-name-main" placeholder="Tu nombre" maxlength="40">
            <textarea id="comment-text-main" placeholder="¿Qué opinas del juego, los personajes o lo que quieras compartir?"></textarea>
            <button>Enviar comentario</button>
        </div>
        <div class="comments-list" id="comments-list-main">
            <p class="no-comments">Sé el primero en opinar.</p>
        </div>
    </div>

  </body>
</html>
